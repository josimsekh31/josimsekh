<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinu | Premium AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #6366f1;
            --accent: #22d3ee;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            background: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        /* The AI Core Orb */
        .orb-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .orb-core {
            position: absolute;
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 60px var(--primary);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .orb-outer {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 2px dashed rgba(168, 85, 247, 0.4);
            border-radius: 50%;
            animation: spin 15s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .listening .orb-core {
            transform: scale(1.1);
            box-shadow: 0 0 100px var(--accent);
            background: linear-gradient(135deg, var(--accent), var(--primary));
        }

        .speaking .orb-core {
            animation: pulse-talk 0.6s infinite alternate;
        }

        @keyframes pulse-talk {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.3); filter: brightness(1.3); }
        }

        /* Floating Pop-ups */
        #popups-container {
            position: absolute;
            top: 20%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }

        .popup-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 10px;
            max-width: 80%;
            text-align: center;
            font-size: 0.95rem;
            color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: twistIn 0.5s ease forwards, fadeOut 0.5s ease forwards 4s;
        }

        @keyframes twistIn {
            from { opacity: 0; transform: translateY(20px) rotate(-5deg); }
            to { opacity: 1; transform: translateY(0) rotate(0deg); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.9); pointer-events: none; }
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 30;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-action:hover { background: rgba(168, 85, 247, 0.2); border-color: var(--primary); }

        .status-badge {
            position: fixed;
            top: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

    </style>
</head>
<body>

    <div class="status-badge" id="status">System Idle</div>

    <div id="popups-container"></div>

    <div class="orb-container" id="orb-trigger">
        <div class="orb-outer"></div>
        <div class="orb-core" id="orb"></div>
    </div>

    <div class="controls">
        <button id="mic-toggle" class="btn-action">
            <svg id="mic-icon" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
        </button>
        <button onclick="location.reload()" class="btn-action">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const ELEVEN_LABS_KEY = "sk_863cbb8276e1c909cf428a5f169f7d4fda528b0eb06b14bb";
        const VOICE_ID = "csPuxct3x4tABDZeKliZ";
        const GEMINI_KEY = "AIzaSyCRav1LXihYQDf61qOqKGpm5hEEJi5lAwg";

        let isListening = false;
        let isSpeaking = false;
        const statusEl = document.getElementById('status');
        const orbEl = document.getElementById('orb');
        const orbContainer = document.querySelector('.orb-container');

        // --- SPEECH SERVICES ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript;
                handleUserVoice(transcript);
            };

            recognition.onend = () => { if (isListening) recognition.start(); };
        }

        // --- CORE FUNCTIONS ---

        function toggleMic() {
            if (isListening) {
                isListening = false;
                recognition.stop();
                statusEl.innerText = "System Idle";
                orbContainer.classList.remove('listening');
            } else {
                isListening = true;
                recognition.start();
                statusEl.innerText = "Listening...";
                orbContainer.classList.add('listening');
                showPopup("Listening... Speak now 💜");
            }
        }

        document.getElementById('mic-toggle').onclick = toggleMic;

        async function handleUserVoice(text) {
            const input = text.toLowerCase().trim();
            showPopup(text, true);

            // AI Adapter Logic
            if (input.includes("search for") || input.includes("find information about") || input.includes("google search")) {
                let query = input.replace(/search for|find information about|google search/g, "").trim();
                playElevenLabsVoice("Searching Google for " + query);
                setTimeout(() => window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank'), 2000);
                return;
            }

            if (input.includes("play") && (input.includes("music") || input.includes("youtube"))) {
                let music = input.replace(/play|music|youtube/g, "").trim();
                playElevenLabsVoice("Opening YouTube for " + music);
                setTimeout(() => window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(music)}`, '_blank'), 2000);
                return;
            }

            // Normal AI Conversation
            getAIResponse(input);
        }

        async function getAIResponse(prompt) {
            statusEl.innerText = "Sinu is thinking...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are Sinu, a friendly AI girl. Respond briefly (1 sentence) and warmly. User says: ${prompt}` }] }]
                    })
                });
                const data = await res.json();
                const aiText = data.candidates[0].content.parts[0].text;
                showPopup(aiText);
                playElevenLabsVoice(aiText);
            } catch (e) {
                showPopup("Connection issue, please try again.");
            } finally {
                statusEl.innerText = isListening ? "Listening..." : "System Idle";
            }
        }

        async function playElevenLabsVoice(text) {
            if (isSpeaking) return;
            isSpeaking = true;
            orbContainer.classList.add('speaking');

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "xi-api-key": ELEVEN_LABS_KEY
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_monolingual_v1",
                        voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                    })
                });

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                audio.onended = () => {
                    isSpeaking = false;
                    orbContainer.classList.remove('speaking');
                };
                audio.play();
            } catch (e) {
                console.error("ElevenLabs Error:", e);
                isSpeaking = false;
                orbContainer.classList.remove('speaking');
            }
        }

        function showPopup(text, isUser = false) {
            const container = document.getElementById('popups-container');
            const card = document.createElement('div');
            card.className = 'popup-card';
            if (isUser) card.style.borderColor = 'var(--accent)';
            
            // Text Summarizer (Trims text if too long for card)
            const summary = text.length > 80 ? text.substring(0, 77) + "..." : text;
            card.innerText = summary;
            
            container.appendChild(card);
            
            // Remove after 5 seconds
            setTimeout(() => card.remove(), 5000);
        }

        // Welcome
        window.onload = () => {
            showPopup("Hey! Tap the mic and say 'Hey Sinu' 💜");
        };

    </script>
</body>
</html>
