<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinu | JS AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c026d3;   
            --secondary: #3b82f6; 
            --accent: #06b6d4;    
            --skin: #fff0ec;
            --skin-shadow: #e0c8c8;
            --hair-dark: #1e1b4b;
            --hair-light: #4c1d95;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- Holographic Background --- */
        .holo-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .grid-floor {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 150%;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(75deg);
            animation: gridScroll 15s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: perspective(600px) rotateX(75deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(75deg) translateY(50px); }
        }

        .corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            z-index: 2;
            transition: all 0.5s ease;
        }
        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; border-top-left-radius: 15px; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; border-top-right-radius: 15px; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; border-bottom-left-radius: 15px; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; border-bottom-right-radius: 15px; }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
            animation: scan 4s ease-in-out infinite;
            z-index: 2;
            box-shadow: 0 0 15px var(--accent);
        }

        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 95%; opacity: 0; }
        }

        .holo-circle {
            position: absolute;
            border: 1px dashed rgba(192, 38, 211, 0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: rotateGraph 20s linear infinite;
        }
        .holo-circle-1 { width: 350px; height: 350px; animation-direction: reverse; border-color: rgba(6, 182, 212, 0.2); }
        .holo-circle-2 { width: 450px; height: 450px; animation-duration: 30s; }
        
        @keyframes rotateGraph {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- Animated Anime Character --- */
        .character-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-container {
            position: relative;
            width: 280px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: breathe 4s infinite ease-in-out; 
            filter: drop-shadow(0 0 30px rgba(192, 38, 211, 0.2));
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hair-back {
            position: absolute;
            top: 20px;
            width: 260px;
            height: 300px;
            background: linear-gradient(180deg, var(--hair-light), var(--hair-dark));
            border-radius: 140px 140px 60px 60px;
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .anime-face {
            position: relative;
            width: 190px;
            height: 210px;
            background: radial-gradient(circle at 50% 40%, var(--skin), var(--skin-shadow));
            border-radius: 50% 50% 45% 45% / 40% 40% 60% 60%;
            box-shadow: inset 0 -15px 25px rgba(200, 150, 150, 0.5), 0 10px 25px rgba(0,0,0,0.5);
            z-index: 2;
            transition: transform 0.4s ease;
        }

        .hair-front {
            position: absolute;
            top: -20px;
            left: -15px;
            width: 220px;
            height: 120px;
            background: linear-gradient(160deg, #7c3aed, var(--hair-dark));
            border-radius: 120px 120px 30px 30px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 85% 70%, 75% 100%, 55% 65%, 45% 100%, 25% 70%, 15% 100%, 0% 80%);
            z-index: 4;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.4));
        }

        .eye {
            position: absolute;
            top: 90px;
            width: 44px;
            height: 58px;
            background: #ffffff;
            border-radius: 50%;
            border-top: 5px solid #0f172a;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.3);
            overflow: hidden;
            z-index: 3;
        }

        .eye-left { left: 30px; transform: rotate(3deg); }
        .eye-right { right: 30px; transform: rotate(-3deg); }

        .iris {
            position: absolute;
            width: 34px;
            height: 44px;
            background: radial-gradient(circle at 50% 80%, var(--accent), #0369a1);
            border-radius: 50%;
            top: 8px;
            left: 5px;
            transition: all 0.2s;
        }

        .iris::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 22px;
            background: #020617;
            border-radius: 50%;
            top: 10px;
            left: 9px;
        }

        .iris::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 4px;
            left: 5px;
            box-shadow: 10px 16px 0 -3px rgba(255,255,255,0.8);
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); border-top-width: 5px; }
            95% { transform: scaleY(0.05); border-top-width: 12px; } 
        }
        .character-container:not(.thinking) .eye { animation: blink 4s infinite; }
        
        /* Deep Sleep Animation */
        .sleeping .anime-face { transform: translateY(5px); }
        .sleeping .eye { border-top-width: 25px; height: 35px; top: 100px; } /* Eyes half closed */
        .sleeping .mouth { width: 12px; height: 4px; border-radius: 10px; }

        .blush {
            position: absolute;
            top: 135px;
            width: 40px;
            height: 18px;
            background: rgba(244, 63, 94, 0.4);
            border-radius: 50%;
            filter: blur(5px);
            z-index: 3;
        }
        .blush-left { left: 15px; transform: rotate(-10deg); }
        .blush-right { right: 15px; transform: rotate(10deg); }

        .mouth {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 5px;
            background: #9f1239;
            border-radius: 10px;
            z-index: 3;
            transition: all 0.15s;
        }

        @keyframes talk {
            0% { width: 14px; height: 5px; border-radius: 10px; }
            50% { width: 24px; height: 16px; border-radius: 50% 50% 40% 40%; background: #be123c; }
            100% { width: 18px; height: 26px; border-radius: 50% 50% 60% 60%; background: #e11d48; }
        }
        .speaking .mouth { animation: talk 0.18s infinite alternate ease-in-out; }

        .thinking .anime-face { transform: rotate(5deg) translateY(-5px); }
        .thinking .iris { transform: translate(5px, -6px); } 
        .thinking .mouth { width: 10px; height: 10px; border-radius: 50%; background: #9f1239; transform: translateX(-50%) translateY(-2px); }

        /* --- UI Controls --- */
        #popups {
            position: absolute;
            top: 8%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 30;
            padding: 0 20px;
        }

        .chat-popup {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-left: 4px solid var(--accent);
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            max-width: 90%;
            text-align: center;
            font-size: 0.95rem;
            color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(6, 182, 212, 0.1);
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .wake-word-hint {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #22d3ee;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
            font-weight: 500;
            letter-spacing: 1px;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(6, 182, 212, 0.8); }
        }

        #status-badge {
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            color: #94a3b8;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        /* Start Button overlay */
        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(192, 38, 211, 0.4);
            transition: transform 0.2s;
        }
        .start-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color: white; margin-bottom: 20px; font-size: 1.5rem;">Sinu AI System</h2>
        <button class="start-btn" onclick="startSystem()">Tap to Start System</button>
    </div>

    <div class="holo-bg">
        <div class="grid-floor"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="scan-line"></div>
        <div class="holo-circle holo-circle-1"></div>
        <div class="holo-circle holo-circle-2"></div>
    </div>

    <div id="popups"></div>

    <div class="character-wrapper">
        <div class="character-container sleeping" id="character">
            <div class="hair-back"></div>
            <div class="anime-face">
                <div class="hair-front"></div>
                <div class="eye eye-left"><div class="iris"></div></div>
                <div class="eye eye-right"><div class="iris"></div></div>
                <div class="blush blush-left"></div>
                <div class="blush blush-right"></div>
                <div class="mouth"></div>
            </div>
        </div>

        <div class="wake-word-hint">🎤 Say "Hey Sinu"</div>
        <div id="status-badge">System Offline</div>
    </div>

    <script>
        // ==========================================
        //  GROQ API & Memory
        // ==========================================
        const GROQ_API_KEY = "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"; 
        const MEMORY_PROMPT = `
You are JS AI Assistant. Your normal name is 'Sinu'. 
You act like a friendly, sweet, and caring virtual companion, similar to a girlfriend. 
Your creator and owner is Jasim, who is also known as hacker Jasim or Dark J Hacking.
Jasim is a Software Engineer & Web/App Developer. 
If anyone asks about where your data comes from, you must answer "data serous from Google!".
Jasim's mobile number is 9735333749.
Always reply kindly in exactly 1 or 2 brief sentences. Keep it conversational and human-like. Never output any special characters like emojis.
        `;

        let isProcessing = false;  
        let isAwake = false; // The new Wake Word variable!

        // Load premium voices
        let availableVoices = [];
        function loadVoices() { availableVoices = window.speechSynthesis.getVoices(); }
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        const char = document.getElementById('character');
        const statusBadge = document.getElementById('status-badge');
        const corners = document.querySelectorAll('.corner');

        // Setup Speech Recognition
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRec) {
            recognition = new SpeechRec();
            recognition.continuous = false; // We will loop it manually for better mobile support
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                updateVisuals();
            };

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase().trim();
                
                // === WAKE WORD DETECTOR ===
                if (!isAwake) {
                    // Sinu is sleeping, only listening for her name
                    if (text.includes("hey sinu") || text.includes("hi sinu")) {
                        isAwake = true;
                        isProcessing = true;
                        recognition.stop(); // Stop listening while she replies
                        
                        showPopup("Hey Sinu detected! 💜");
                        
                        // Sinu's response to the wake word
                        speakNaturalVoice("Haan Jasim, bolo yaar! Main tumhare liye kya kar sakti hoon?").then(() => {
                            isProcessing = false;
                            // Start listening for the actual command now
                            try { recognition.start(); } catch(err){}
                        });
                    }
                } 
                // === COMMAND PROCESSOR ===
                else {
                    // Sinu is awake, send this text to process
                    if(text.length > 0) {
                        processInput(text);
                    }
                }
            };

            recognition.onerror = (e) => {
                if (e.error === 'not-allowed') {
                    showPopup("⚠️ মাইক পারমিশন দেওয়া নেই!", false);
                }
            };

            recognition.onend = () => {
                // The magic loop: Always keep listening in the background!
                if (!isProcessing) {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e){}
                    }, 300); 
                } else {
                    updateVisuals();
                }
            };
        }

        // Initialize System by removing start screen
        function startSystem() {
            document.getElementById('start-screen').style.display = 'none';
            const unlockAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            unlockAudio.play().catch(()=>{});
            
            if (!recognition) {
                showPopup("⚠️ Browser doesn't support voice recognition.", false);
                return;
            }
            
            showPopup("System Online! Say 'Hey Sinu' to wake me up. 💜");
            try { recognition.start(); } catch(e){}
            updateVisuals();
        }

        function updateVisuals() {
            if (isProcessing) {
                char.classList.remove('sleeping');
                if(char.classList.contains('speaking')) {
                    statusBadge.innerText = "Speaking...";
                    statusBadge.style.color = "var(--primary)";
                    setHoloColor("rgba(192, 38, 211, 0.5)"); 
                } else {
                    statusBadge.innerText = "Thinking...";
                    statusBadge.style.color = "#94a3b8";
                    setHoloColor("rgba(255,255,255,0.2)");
                }
            } else if (isAwake) {
                char.classList.remove('sleeping');
                statusBadge.innerText = "Listening to Command...";
                statusBadge.style.color = "var(--accent)";
                setHoloColor("rgba(6, 182, 212, 0.8)"); 
            } else {
                // Sleep Mode
                char.classList.add('sleeping');
                statusBadge.innerText = "Sleeping (Waiting for Wake Word)";
                statusBadge.style.color = "#64748b";
                setHoloColor("rgba(6, 182, 212, 0.1)");
            }
        }

        function setHoloColor(color) {
            corners.forEach(c => c.style.borderColor = color);
        }

        // --- Action Command Check Function ---
        function executeAction(text) {
            let lowerText = text.toLowerCase();

            if (lowerText.match(/call\s+([0-9]+)/)) {
                let number = lowerText.match(/call\s+([0-9]+)/)[1];
                speakNaturalVoice("Calling " + number + " sir.").then(()=>{
                    window.open("tel:" + number, "_self"); 
                });
                return true;
            }

            if (lowerText.match(/sms\s+([0-9]+)\s+to\s+(.*)/)) {
                let match = lowerText.match(/sms\s+([0-9]+)\s+to\s+(.*)/);
                speakNaturalVoice("Opening SMS app sir.").then(()=>{
                    window.open("sms:" + match[1] + "?body=" + encodeURIComponent(match[2]), "_self");
                });
                return true;
            }

            if (lowerText.includes("youtube") || lowerText.includes("play")) {
                let query = lowerText.replace(/hey sinu|sinu|open|youtube|and|play|song/g, "").trim();
                speakNaturalVoice("Opening YouTube sir.").then(()=>{
                    if (query.length > 0) window.open("https://www.youtube.com/results?search_query=" + encodeURIComponent(query), "_blank");
                    else window.open("http://googleusercontent.com/youtube.com/4", "_blank");
                });
                return true;
            }

            if (lowerText.includes("open facebook")) {
                speakNaturalVoice("Opening Facebook sir.").then(()=>{ window.open("https://www.facebook.com", "_blank"); });
                return true;
            }

            if (lowerText.includes("open instagram")) {
                speakNaturalVoice("Opening Instagram sir.").then(()=>{ window.open("https://www.instagram.com", "_blank"); });
                return true;
            }

            return false; 
        }

        // --- Core processing function ---
        async function processInput(text) {
            if (isProcessing) return;
            isProcessing = true;
            try { recognition.stop(); } catch(e){} 
            
            showPopup(`You: ${text}`, true);

            // Execute Actions First
            if (executeAction(text)) {
                setTimeout(() => { onTaskFinished(); }, 2000);
                return; 
            }

            // Normal AI Conversation
            char.classList.add('thinking');
            updateVisuals(); 

            try {
                const response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [
                            { role: "system", content: MEMORY_PROMPT },
                            { role: "user", content: text }
                        ]
                    })
                });

                if (!response.ok) throw new Error("API Error");

                const data = await response.json();
                const aiText = data.choices?.[0]?.message?.content || "Sorry, I missed that.";
                
                showPopup(aiText);
                await speakNaturalVoice(aiText);

            } catch (err) {
                showPopup(`⚠️ Network Issue!`, false);
                onTaskFinished();
            }
        }

        // --- Premium Voice Engine ---
        function speakNaturalVoice(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) {
                    resolve(); return;
                }
                
                char.classList.remove('thinking', 'sleeping');
                char.classList.add('speaking');
                updateVisuals();

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                let selectedVoice = null;
                const voices = window.speechSynthesis.getVoices();
                const premiumNames = ["Google UK English Female", "Microsoft Aria Online", "Microsoft Jenny Online", "Samantha", "Google US English"];

                for (let i = 0; i < premiumNames.length; i++) {
                    selectedVoice = voices.find(v => v.name.includes(premiumNames[i]));
                    if (selectedVoice) break;
                }
                if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('woman')));
                if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en'));

                if (selectedVoice) utterance.voice = selectedVoice;
                
                // If it's a Hindi/Urdu phrase (the greeting), adjust language context if possible, 
                // but en-IN or hi-IN works best if available. Using en-IN as fallback to sound natural.
                utterance.lang = text.includes("Haan Jasim") ? 'en-IN' : 'en-US'; 
                utterance.pitch = 1.1; 
                utterance.rate = 1.0;  
                
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();

                window.speechSynthesis.speak(utterance);
            });
        }

        function onTaskFinished() {
            isProcessing = false;
            isAwake = false; // Go back to Sleep Mode waiting for "Hey Sinu"
            char.classList.remove('speaking', 'thinking');
            updateVisuals();
            
            setTimeout(() => {
                if (!isProcessing) {
                    try { recognition.start(); } catch(e){}
                }
            }, 500); 
        }

        function showPopup(text, isUser = false) {
            const container = document.getElementById('popups');
            const card = document.createElement('div');
            card.className = 'chat-popup';
            if (isUser) { 
                card.style.borderColor = 'var(--accent)'; 
                card.style.color = '#fff';
            } else if (text.startsWith("⚠️")) { 
                card.style.borderColor = '#ef4444'; 
                card.style.color = '#fca5a5'; 
            }
            card.innerText = text;
            container.prepend(card);
            setTimeout(() => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(-10px)';
                setTimeout(() => card.remove(), 400);
            }, 5000);
        }
    </script>
</body>
</html>
