<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinu | Premium Anime Voice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c026d3;   /* Fuchsia */
            --secondary: #3b82f6; /* Blue */
            --accent: #06b6d4;    /* Cyan */
            --skin: #fff0ec;
            --skin-shadow: #e0c8c8;
            --hair-dark: #1e1b4b;
            --hair-light: #4c1d95;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- 4-Sided Holographic Graph Background --- */
        .holo-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* 3D Perspective Grid */
        .grid-floor {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 150%;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(75deg);
            animation: gridScroll 15s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: perspective(600px) rotateX(75deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(75deg) translateY(50px); }
        }

        /* 4 Corner Sci-Fi Brackets */
        .corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            z-index: 2;
            transition: all 0.5s ease;
        }
        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; border-top-left-radius: 15px; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; border-top-right-radius: 15px; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; border-bottom-left-radius: 15px; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; border-bottom-right-radius: 15px; }

        /* Scanning Line */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
            animation: scan 4s ease-in-out infinite;
            z-index: 2;
            box-shadow: 0 0 15px var(--accent);
        }

        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 95%; opacity: 0; }
        }

        /* Holographic Circles (Graphs) */
        .holo-circle {
            position: absolute;
            border: 1px dashed rgba(192, 38, 211, 0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: rotateGraph 20s linear infinite;
        }
        .holo-circle-1 { width: 350px; height: 350px; animation-direction: reverse; border-color: rgba(6, 182, 212, 0.2); }
        .holo-circle-2 { width: 450px; height: 450px; animation-duration: 30s; }
        
        @keyframes rotateGraph {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- Realistic Anime Character --- */
        .character-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-container {
            position: relative;
            width: 280px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: breathe 4s infinite ease-in-out; 
            filter: drop-shadow(0 0 30px rgba(192, 38, 211, 0.2));
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hair-back {
            position: absolute;
            top: 20px;
            width: 260px;
            height: 300px;
            background: linear-gradient(180deg, var(--hair-light), var(--hair-dark));
            border-radius: 140px 140px 60px 60px;
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .anime-face {
            position: relative;
            width: 190px;
            height: 210px;
            background: radial-gradient(circle at 50% 40%, var(--skin), var(--skin-shadow));
            border-radius: 50% 50% 45% 45% / 40% 40% 60% 60%;
            box-shadow: inset 0 -15px 25px rgba(200, 150, 150, 0.5), 0 10px 25px rgba(0,0,0,0.5);
            z-index: 2;
            transition: transform 0.4s ease;
        }

        .hair-front {
            position: absolute;
            top: -20px;
            left: -15px;
            width: 220px;
            height: 120px;
            background: linear-gradient(160deg, #7c3aed, var(--hair-dark));
            border-radius: 120px 120px 30px 30px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 85% 70%, 75% 100%, 55% 65%, 45% 100%, 25% 70%, 15% 100%, 0% 80%);
            z-index: 4;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.4));
        }

        .eye {
            position: absolute;
            top: 90px;
            width: 44px;
            height: 58px;
            background: #ffffff;
            border-radius: 50%;
            border-top: 5px solid #0f172a;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.3);
            overflow: hidden;
            z-index: 3;
        }

        .eye-left { left: 30px; transform: rotate(3deg); }
        .eye-right { right: 30px; transform: rotate(-3deg); }

        .iris {
            position: absolute;
            width: 34px;
            height: 44px;
            background: radial-gradient(circle at 50% 80%, var(--accent), #0369a1);
            border-radius: 50%;
            top: 8px;
            left: 5px;
            transition: all 0.2s;
        }

        .iris::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 22px;
            background: #020617;
            border-radius: 50%;
            top: 10px;
            left: 9px;
        }

        .iris::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 4px;
            left: 5px;
            box-shadow: 10px 16px 0 -3px rgba(255,255,255,0.8);
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); border-top-width: 5px; }
            95% { transform: scaleY(0.05); border-top-width: 12px; } 
        }
        .character-container:not(.thinking) .eye { animation: blink 4s infinite; }

        .blush {
            position: absolute;
            top: 135px;
            width: 40px;
            height: 18px;
            background: rgba(244, 63, 94, 0.4);
            border-radius: 50%;
            filter: blur(5px);
            z-index: 3;
        }
        .blush-left { left: 15px; transform: rotate(-10deg); }
        .blush-right { right: 15px; transform: rotate(10deg); }

        .mouth {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 5px;
            background: #9f1239;
            border-radius: 10px;
            z-index: 3;
            transition: all 0.15s;
        }

        @keyframes talk {
            0% { width: 14px; height: 5px; border-radius: 10px; }
            50% { width: 24px; height: 16px; border-radius: 50% 50% 40% 40%; background: #be123c; }
            100% { width: 18px; height: 26px; border-radius: 50% 50% 60% 60%; background: #e11d48; }
        }
        .speaking .mouth { animation: talk 0.18s infinite alternate ease-in-out; }

        .thinking .anime-face { transform: rotate(5deg) translateY(-5px); }
        .thinking .iris { transform: translate(5px, -6px); } 
        .thinking .mouth { width: 10px; height: 10px; border-radius: 50%; background: #9f1239; transform: translateX(-50%) translateY(-2px); }

        /* --- UI Controls --- */
        #popups {
            position: absolute;
            top: 8%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 30;
            padding: 0 20px;
        }

        .chat-popup {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-left: 4px solid var(--accent);
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            max-width: 90%;
            text-align: center;
            font-size: 0.95rem;
            color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(6, 182, 212, 0.1);
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .controls {
            position: relative;
            display: flex;
            gap: 25px;
            z-index: 40;
            margin-top: 40px;
        }

        /* Glassmorphism Buttons */
        .btn {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:active { transform: scale(0.9); }

        /* Muted State */
        .btn.muted {
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        /* Active Listening State (Glowing Cyan) */
        .btn.active { 
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.4); 
            animation: pulse-mic 2s infinite;
        }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }
            50% { box-shadow: 0 0 35px rgba(6, 182, 212, 0.7), inset 0 0 15px rgba(6, 182, 212, 0.4); }
            100% { box-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }
        }

        /* UI Status Badge */
        #status-badge {
            margin-top: 20px;
            padding: 6px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            color: #94a3b8;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

    <!-- Holographic Background -->
    <div class="holo-bg">
        <div class="grid-floor"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="scan-line"></div>
        <div class="holo-circle holo-circle-1"></div>
        <div class="holo-circle holo-circle-2"></div>
    </div>

    <div id="popups"></div>
    <audio id="ai-voice-player" playsinline style="display: none;"></audio>

    <div class="character-wrapper">
        <div class="character-container" id="character">
            <div class="hair-back"></div>
            <div class="anime-face">
                <div class="hair-front"></div>
                <div class="eye eye-left"><div class="iris"></div></div>
                <div class="eye eye-right"><div class="iris"></div></div>
                <div class="blush blush-left"></div>
                <div class="blush blush-right"></div>
                <div class="mouth"></div>
            </div>
        </div>

        <div id="status-badge">সিস্টেম রেডি</div>

        <div class="controls">
            <!-- MIC BUTTON -->
            <button id="mic-toggle" class="btn muted">
                <svg id="mic-icon-on" class="w-8 h-8" style="display:none;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                <svg id="mic-icon-off" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></line></svg>
            </button>
            <!-- REFRESH BUTTON -->
            <button onclick="location.reload()" class="btn">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // API Settings
        const GEMINI_KEY = ""; 
        const ELEVEN_LABS_KEY = "sk_863cbb8276e1c909cf428a5f169f7d4fda528b0eb06b14bb";
        const VOICE_ID = "csPuxct3x4tABDZeKliZ";

        // Bulletproof State Machine
        let isMuted = true;        // User's manual toggle (App starts muted)
        let isProcessing = false;  // AI is fetching data or speaking
        let isRecognizing = false; // Actual Chrome Speech Engine Status

        const char = document.getElementById('character');
        const statusBadge = document.getElementById('status-badge');
        const micBtn = document.getElementById('mic-toggle');
        const micIconOn = document.getElementById('mic-icon-on');
        const micIconOff = document.getElementById('mic-icon-off');
        const voicePlayer = document.getElementById('ai-voice-player');
        
        // UI Elements for Holo effect
        const corners = document.querySelectorAll('.corner');

        // Setup Speech Recognition
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRec) {
            recognition = new SpeechRec();
            recognition.continuous = false; // Very important for reliable restarts
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isRecognizing = true;
                updateVisuals();
            };

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                if (text.trim().length > 0) {
                    processInput(text);
                }
            };

            recognition.onerror = (e) => {
                console.warn("Speech Error:", e.error);
                if (e.error === 'not-allowed') {
                    isMuted = true;
                    showPopup("⚠️ মাইক পারমিশন দেওয়া নেই!", false);
                }
                isRecognizing = false;
                updateVisuals();
            };

            // THE MOST CRITICAL PART: Auto-Restart Logic
            recognition.onend = () => {
                isRecognizing = false;
                
                // If user didn't mute AND AI is not processing, restart it
                if (!isMuted && !isProcessing) {
                    // Safe buffer timeout prevents Chrome from throwing InvalidStateError
                    setTimeout(() => {
                        if (!isMuted && !isProcessing && !isRecognizing) {
                            try { recognition.start(); } catch(e){}
                        }
                    }, 400); 
                } else {
                    updateVisuals();
                }
            };
        }

        // --- Visual Engine ---
        function updateVisuals() {
            if (isMuted) {
                micBtn.className = "btn muted";
                micIconOn.style.display = 'none';
                micIconOff.style.display = 'block';
                statusBadge.innerText = "মিউট করা আছে";
                statusBadge.style.color = "#ef4444";
                statusBadge.style.borderColor = "rgba(239, 68, 68, 0.3)";
                setHoloColor("rgba(6, 182, 212, 0.3)"); // Reset to cyan
            } else if (isProcessing) {
                micBtn.className = "btn";
                micIconOn.style.display = 'block';
                micIconOff.style.display = 'none';
                micBtn.style.color = "var(--primary)";
                
                if(char.classList.contains('speaking')) {
                    statusBadge.innerText = "বলছি...";
                    statusBadge.style.color = "var(--primary)";
                    statusBadge.style.borderColor = "var(--primary)";
                    setHoloColor("rgba(192, 38, 211, 0.5)"); // Fuchsia
                } else {
                    statusBadge.innerText = "ভাবছি...";
                    statusBadge.style.color = "#94a3b8";
                    statusBadge.style.borderColor = "rgba(255,255,255,0.2)";
                }
            } else if (isRecognizing) {
                micBtn.className = "btn active";
                micIconOn.style.display = 'block';
                micIconOff.style.display = 'none';
                statusBadge.innerText = "শুনছি...";
                statusBadge.style.color = "var(--accent)";
                statusBadge.style.borderColor = "var(--accent)";
                setHoloColor("rgba(6, 182, 212, 0.8)"); // Bright Cyan
            }
        }

        function setHoloColor(color) {
            corners.forEach(c => c.style.borderColor = color);
        }

        // --- Core Action: Mic Button Click ---
        micBtn.onclick = () => {
            // Mobile browser audio unlock policy
            voicePlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
            voicePlayer.play().catch(()=>{});
            
            if (!recognition) {
                showPopup("⚠️ আপনার ব্রাউজারে ভয়েস সাপোর্ট নেই।", false);
                return;
            }

            // Toggle state
            isMuted = !isMuted;
            
            if (isMuted) {
                showPopup("মাইক অফ করা হলো। 🔇");
                if (isRecognizing) {
                    try { recognition.stop(); } catch(e){} // Stops mic gracefully
                }
            } else {
                showPopup("মাইক অন! কথা বলুন। 💜");
                if (!isProcessing && !isRecognizing) {
                    try { recognition.start(); } catch(e){}
                }
            }
            updateVisuals();
        };

        // --- AI Processing ---
        async function processInput(text) {
            if (isProcessing) return;
            
            // 1. Enter Processing State
            isProcessing = true;
            if (isRecognizing) {
                try { recognition.stop(); } catch(e){} // Force stop listening
            }
            
            showPopup(text, true);
            char.classList.add('thinking');
            updateVisuals(); 

            try {
                // Fetch Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are Sinu, a sweet, futuristic anime AI. Reply kindly in 1 brief sentence. User says: ${text}` }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I missed that.";
                
                showPopup(aiText);
                
                // Fetch TTS
                await speakElevenLabs(aiText);

            } catch (err) {
                showPopup("ইন্টারনেট কানেকশন চেক করুন... 💜");
                onTaskFinished();
            }
        }

        async function speakElevenLabs(text) {
            char.classList.remove('thinking');
            char.classList.add('speaking');
            updateVisuals();

            try {
                const elResponse = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?output_format=mp3_44100_128`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "xi-api-key": ELEVEN_LABS_KEY },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });

                if (!elResponse.ok) throw new Error("API Error");

                const blob = await elResponse.blob();
                await playAudio(URL.createObjectURL(blob));

            } catch (err) {
                showPopup("⚠️ ভয়েস প্লে হতে সমস্যা।", false);
                onTaskFinished();
            }
        }

        function playAudio(url) {
            return new Promise((resolve) => {
                voicePlayer.src = url;
                voicePlayer.load(); 
                
                voicePlayer.onended = () => {
                    URL.revokeObjectURL(url); 
                    onTaskFinished();
                    resolve();
                };
                
                voicePlayer.onerror = () => {
                    onTaskFinished();
                    resolve();
                };
                
                voicePlayer.play().catch(e => {
                    onTaskFinished();
                    resolve();
                });
            });
        }

        // 2. Exit Processing State (Auto-Unmute happens here)
        function onTaskFinished() {
            isProcessing = false;
            char.classList.remove('speaking', 'thinking');
            updateVisuals();
            
            // The magic Unmute: If user didn't press mute, restart mic automatically
            if (!isMuted && !isRecognizing) {
                setTimeout(() => {
                    if (!isMuted && !isProcessing && !isRecognizing) {
                        try { recognition.start(); } catch(e){}
                    }
                }, 400); // 400ms buffer is critical for mobile Chrome
            }
        }

        function showPopup(text, isUser = false) {
            const container = document.getElementById('popups');
            const card = document.createElement('div');
            card.className = 'chat-popup';
            if (isUser) { 
                card.style.borderColor = 'var(--accent)'; 
                card.style.color = '#fff';
            } else if (text.startsWith("⚠️")) { 
                card.style.borderColor = '#ef4444'; 
                card.style.color = '#fca5a5'; 
            }
            card.innerText = text;
            container.prepend(card);
            setTimeout(() => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(-10px)';
                setTimeout(() => card.remove(), 400);
            }, 7000);
        }

        window.onload = () => showPopup("সিস্টেম চালু হয়েছে! মাইক অন করুন। 💜");
    </script>
</body>
</html>
