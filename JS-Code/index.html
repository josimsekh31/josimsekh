<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Code Editor | Premium IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-dark: rgba(30, 33, 45, 0.7);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --text-main: #e0e0e0;
            --text-dim: #909090;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --sidebar-w: 280px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .light-mode {
            --bg-dark: #f5f7fa;
            --panel-dark: rgba(255, 255, 255, 0.8);
            --accent: #6200ea;
            --accent-glow: rgba(98, 0, 234, 0.2);
            --text-main: #2d3436;
            --text-dim: #636e72;
            --glass: rgba(0, 0, 0, 0.02);
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* --- UI Components --- */
        
        /* Navbar */
        nav {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            background: var(--panel-dark);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            position: relative;
        }

        .logo {
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--accent), #b388ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.2rem;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .icon-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        /* Layout Main */
        .app-container {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 45px; /* Collapsed width */
            background: var(--panel-dark);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 90;
        }

        .sidebar.expanded {
            width: var(--sidebar-w);
        }

        .sidebar-toggle {
            height: 100%;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: absolute;
            right: 0;
            top: 0;
            transition: var(--transition);
        }

        .sidebar.expanded .sidebar-toggle {
            height: 50px;
            width: 50px;
            right: 10px;
            top: 10px;
        }

        .sidebar-content {
            opacity: 0;
            pointer-events: none;
            padding: 20px;
            transition: opacity 0.3s;
            width: var(--sidebar-w);
        }

        .sidebar.expanded .sidebar-content {
            opacity: 1;
            pointer-events: all;
        }

        .project-section { margin-bottom: 25px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tree-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .tree-item:hover { background: var(--glass); }
        .tree-item.active { background: var(--accent-glow); color: var(--accent); }
        .tree-item i { width: 16px; text-align: center; }

        /* Editor Area */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            position: relative;
        }

        /* Tabs */
        .tabs-container {
            height: 45px;
            background: var(--panel-dark);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }

        .tabs-container::-webkit-scrollbar { height: 0; }

        .tab {
            min-width: 140px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-right: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: 0.3s;
            background: rgba(0,0,0,0.1);
        }

        .tab.active {
            background: var(--bg-dark);
            color: var(--accent);
            border-top: 2px solid var(--accent);
        }

        .tab-close:hover { color: #ff5252; }

        /* Editor Core */
        #editor-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            padding: 20px;
            counter-reset: line;
        }

        #code-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: transparent;
            caret-color: var(--accent);
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            position: absolute;
            z-index: 2;
            white-space: pre;
            padding-left: 50px;
        }

        #code-highlight {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre;
            z-index: 1;
            padding-left: 50px;
        }

        .line-numbers {
            position: absolute;
            left: 20px;
            top: 20px;
            color: var(--text-dim);
            text-align: right;
            padding-right: 15px;
            border-right: 1px solid var(--border);
            user-select: none;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Syntax Highlighting */
        .hlt-keyword { color: #c678dd; }
        .hlt-func { color: #61afef; }
        .hlt-str { color: #98c379; }
        .hlt-tag { color: #e06c75; }
        .hlt-attr { color: #d19a66; }
        .hlt-comment { color: #5c6370; font-style: italic; }

        /* Right Drawer */
        .drawer {
            position: absolute;
            right: -320px;
            top: 0;
            width: 320px;
            height: 100%;
            background: var(--panel-dark);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            z-index: 110;
            transition: var(--transition);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .drawer.open { right: 0; }

        .drawer-handle {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 100px;
            background: var(--panel-dark);
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 15px 0 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-dim);
        }

        /* Tools */
        .tool-group { margin-bottom: 30px; }
        .tool-group h4 { margin-bottom: 15px; color: var(--accent); font-size: 0.9rem; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 10px;
        }

        .color-preview {
            width: 100%;
            height: 80px;
            border-radius: 12px;
            margin: 15px 0;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Preview Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 1000;
            opacity: 0;
            transition: 0.4s;
        }

        .modal.active { display: block; opacity: 1; }
        
        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            z-index: 1001;
            transition: 0.3s;
        }

        .close-modal:hover { color: var(--accent); transform: rotate(90deg); }

        /* Status Bar */
        .status-bar {
            height: 30px;
            background: var(--panel-dark);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            gap: 20px;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    </style>
</head>
<body class="dark-mode">

    <nav>
        <div class="logo"><i class="fas fa-terminal"></i> JS Code</div>
        <div class="nav-actions">
            <button class="icon-btn" title="New Project" onclick="createNewProject()"><i class="fas fa-plus"></i></button>
            <button class="icon-btn" title="Save All" onclick="saveAll()"><i class="fas fa-save"></i></button>
            <button class="icon-btn" title="Run Project" style="background: var(--accent);" onclick="runCode()"><i class="fas fa-play"></i></button>
            <button class="icon-btn" title="Toggle Theme" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="icon-btn" title="Export JSON" onclick="exportProject()"><i class="fas fa-download"></i></button>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="fas fa-chevron-right" id="sidebar-icon"></i>
            </div>
            <div class="sidebar-content">
                <div class="project-section">
                    <div class="section-header">
                        <span>Projects</span>
                        <i class="fas fa-folder-plus" style="cursor:pointer" onclick="createNewProject()"></i>
                    </div>
                    <div id="project-list">
                        </div>
                </div>
                <div class="project-section">
                    <div class="section-header">
                        <span>Files</span>
                        <i class="fas fa-file-circle-plus" style="cursor:pointer" onclick="createNewFile()"></i>
                    </div>
                    <div id="file-tree">
                        </div>
                </div>
            </div>
        </aside>

        <main class="editor-main">
            <div class="tabs-container" id="tabs-bar">
                </div>
            
            <div id="editor-wrapper">
                <div class="line-numbers" id="line-numbers">1</div>
                <pre id="code-highlight"><code></code></pre>
                <textarea id="code-input" spellcheck="false" oninput="updateEditor()" onkeydown="handleTab(event)"></textarea>
            </div>

            <div class="status-bar">
                <span id="pos-stat">Ln 1, Col 1</span>
                <span id="file-stat">No File Open</span>
                <span>UTF-8</span>
            </div>
        </main>

        <div class="drawer" id="right-drawer">
            <div class="drawer-handle" onclick="toggleDrawer()">
                <i class="fas fa-screwdriver-wrench"></i>
            </div>
            <div class="tool-group">
                <h4><i class="fas fa-search"></i> Search & Replace</h4>
                <input type="text" id="find-input" placeholder="Find..." oninput="highlightMatches()">
                <input type="text" id="replace-input" placeholder="Replace with...">
                <button class="icon-btn" style="width: 100%; border-radius: 8px;" onclick="replaceText()">Replace All</button>
            </div>

            <div class="tool-group">
                <h4><i class="fas fa-palette"></i> Color Picker</h4>
                <input type="color" id="color-picker" style="width:100%; height:40px; border:none; cursor:pointer;" oninput="updateColorPreview()">
                <div id="color-hex" class="color-preview" style="background: #7c4dff;">#7C4DFF</div>
                <button class="icon-btn" style="width: 100%; border-radius: 8px;" onclick="insertColor()">Insert Hex</button>
            </div>
        </div>
    </div>

    <div class="modal" id="preview-modal">
        <i class="fas fa-times close-modal" onclick="closePreview()"></i>
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="toast" class="toast">Project Saved!</div>

    <script>
        /* --- State Management --- */
        let state = {
            projects: JSON.parse(localStorage.getItem('js-ide-projects')) || [
                { id: 'p1', name: 'My First App', files: [
                    { name: 'index.html', content: '<h1>Hello World</h1>', type: 'html' },
                    { name: 'style.css', content: 'body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin-top: 50px; }', type: 'css' },
                    { name: 'script.js', content: 'console.log("App Running...");', type: 'js' }
                ]}
            ],
            currentProjectId: 'p1',
            activeFileName: 'index.html',
            theme: localStorage.getItem('js-ide-theme') || 'dark'
        };

        const input = document.getElementById('code-input');
        const highlight = document.querySelector('#code-highlight code');
        const lineNums = document.getElementById('line-numbers');

        /* --- Initialization --- */
        window.onload = () => {
            if(state.theme === 'light') toggleTheme(true);
            renderProjects();
            openFile('index.html');
            initListeners();
        };

        function initListeners() {
            input.addEventListener('scroll', () => {
                document.getElementById('code-highlight').scrollTop = input.scrollTop;
                lineNums.scrollTop = input.scrollTop;
            });

            input.addEventListener('keyup', updateStats);
            input.addEventListener('click', updateStats);
        }

        /* --- Core Logic --- */

        function updateEditor() {
            const code = input.value;
            highlight.innerHTML = syntaxHighlight(code);
            updateLineNumbers();
            
            // Auto-save to state
            const project = state.projects.find(p => p.id === state.currentProjectId);
            const file = project.files.find(f => f.name === state.activeFileName);
            if(file) file.content = code;
            
            localStorage.setItem('js-ide-projects', JSON.stringify(state.projects));
        }

        function syntaxHighlight(code) {
            return code
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/\/\/.*/g, m => `<span class="hlt-comment">${m}</span>`)
                .replace(/\b(function|let|const|var|if|else|return|for|while|class|export|import|new)\b/g, '<span class="hlt-keyword">$1</span>')
                .replace(/\b(console|window|document|Math|Object|Array)\b/g, '<span class="hlt-func">$1</span>')
                .replace(/"(.*?)"/g, '<span class="hlt-str">"$1"</span>')
                .replace(/'(.*?)'/g, "<span class='hlt-str'>'$1'</span>")
                .replace(/&lt;([a-z1-6]+)/gi, '&lt;<span class="hlt-tag">$1</span>')
                .replace(/([a-z-]+)=/gi, '<span class="hlt-attr">$1</span>=');
        }

        function updateLineNumbers() {
            const lines = input.value.split('\n').length;
            let nums = '';
            for(let i=1; i<=lines; i++) nums += i + '<br>';
            lineNums.innerHTML = nums;
        }

        function handleTab(e) {
            if(e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + "    " + input.value.substring(end);
                input.selectionStart = input.selectionEnd = start + 4;
                updateEditor();
            }
            if(e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveAll();
            }
        }

        /* --- UI Interactions --- */

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const icon = document.getElementById('sidebar-icon');
            sb.classList.toggle('expanded');
            icon.className = sb.classList.contains('expanded') ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
        }

        function toggleDrawer() {
            document.getElementById('right-drawer').classList.toggle('open');
        }

        function toggleTheme(forceLight = false) {
            if(forceLight || !document.body.classList.contains('light-mode')) {
                document.body.classList.add('light-mode');
                state.theme = 'light';
            } else {
                document.body.classList.remove('light-mode');
                state.theme = 'dark';
            }
            localStorage.setItem('js-ide-theme', state.theme);
        }

        /* --- Project & File System --- */

        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = state.projects.map(p => `
                <div class="tree-item ${p.id === state.currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
                    <i class="fas fa-cube"></i> ${p.name}
                    <i class="fas fa-trash" style="margin-left:auto; font-size:0.7rem;" onclick="deleteProject(event, '${p.id}')"></i>
                </div>
            `).join('');
            renderFiles();
        }

        function renderFiles() {
            const project = state.projects.find(p => p.id === state.currentProjectId);
            const tree = document.getElementById('file-tree');
            const tabs = document.getElementById('tabs-bar');
            
            tree.innerHTML = project.files.map(f => `
                <div class="tree-item ${f.name === state.activeFileName ? 'active' : ''}" onclick="openFile('${f.name}')">
                    <i class="fas ${getFileIcon(f.name)}"></i> ${f.name}
                </div>
            `).join('');

            tabs.innerHTML = project.files.map(f => `
                <div class="tab ${f.name === state.activeFileName ? 'active' : ''}" onclick="openFile('${f.name}')">
                    <span>${f.name}</span>
                    <i class="fas fa-times tab-close" onclick="closeTab(event, '${f.name}')"></i>
                </div>
            `).join('');
        }

        function getFileIcon(name) {
            if(name.endsWith('.html')) return 'fa-brands fa-html5';
            if(name.endsWith('.css')) return 'fa-brands fa-css3-alt';
            if(name.endsWith('.js')) return 'fa-brands fa-js';
            return 'fa-file-code';
        }

        function openFile(name) {
            const project = state.projects.find(p => p.id === state.currentProjectId);
            const file = project.files.find(f => f.name === name);
            if(file) {
                state.activeFileName = name;
                input.value = file.content;
                document.getElementById('file-stat').innerText = name;
                updateEditor();
                renderFiles();
            }
        }

        function createNewProject() {
            const name = prompt("Project Name:", "New Project");
            if(name) {
                const id = 'p' + Date.now();
                state.projects.push({
                    id: id,
                    name: name,
                    files: [{ name: 'index.html', content: '', type: 'html' }]
                });
                state.currentProjectId = id;
                state.activeFileName = 'index.html';
                saveAll();
                renderProjects();
                openFile('index.html');
            }
        }

        function createNewFile() {
            const name = prompt("File Name (with extension):", "script.js");
            if(name) {
                const project = state.projects.find(p => p.id === state.currentProjectId);
                project.files.push({ name: name, content: '', type: name.split('.').pop() });
                saveAll();
                openFile(name);
            }
        }

        /* --- Tools --- */

        function updateColorPreview() {
            const val = document.getElementById('color-picker').value;
            const preview = document.getElementById('color-hex');
            preview.style.background = val;
            preview.innerText = val.toUpperCase();
        }

        function insertColor() {
            const val = document.getElementById('color-picker').value;
            const start = input.selectionStart;
            input.value = input.value.substring(0, start) + val + input.value.substring(input.selectionEnd);
            updateEditor();
        }

        function updateStats() {
            const text = input.value.substring(0, input.selectionStart);
            const line = text.split('\n').length;
            const col = text.split('\n').pop().length + 1;
            document.getElementById('pos-stat').innerText = `Ln ${line}, Col ${col}`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function saveAll() {
            localStorage.setItem('js-ide-projects', JSON.stringify(state.projects));
            showToast("Workspace Saved");
        }

        /* --- Execution --- */

        function runCode() {
            const project = state.projects.find(p => p.id === state.currentProjectId);
            const html = project.files.find(f => f.name.endsWith('.html'))?.content || '';
            const css = project.files.find(f => f.name.endsWith('.css'))?.content || '';
            const js = project.files.find(f => f.name.endsWith('.js'))?.content || '';

            const combined = `
                <html>
                    <head><style>${css}</style></head>
                    <body>
                        ${html}
                        <script>${js}<\/script>
                    </body>
                </html>
            `;

            const modal = document.getElementById('preview-modal');
            const frame = document.getElementById('preview-frame');
            modal.classList.add('active');
            
            const doc = frame.contentWindow.document;
            doc.open();
            doc.write(combined);
            doc.close();
        }
        function closePreview() {
            document.getElementById('preview-modal').classList.remove('active');
        }

        function exportProject() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.projects));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "js_editor_projects.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
