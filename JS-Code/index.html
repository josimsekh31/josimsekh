<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JS Code Editor | Desktop IDE</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg-primary: #1e1e2f;
            --bg-secondary: #252536;
            --bg-sidebar: #181825;
            --bg-editor: #1e1e2e;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --border: #3f3f4e;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --tab-active: #2d2d3f;
            --tab-inactive: #20202e;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        body.light {
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f3f4f6;
            --bg-editor: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border: #e5e7eb;
            --accent: #2563eb;
            --tab-active: #ffffff;
            --tab-inactive: #f3f4f6;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Layout Grid */
        .app {
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 280px 1fr 280px;
            height: 100vh;
            gap: 0;
        }

        /* Navbar */
        .navbar {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: var(--shadow);
            z-index: 10;
        }
        .logo h1 {
            font-size: 1.35rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-1px);
        }
        .btn-icon {
            padding: 6px 10px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .explorer-header {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .explorer-title {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .folder-actions {
            display: flex;
            gap: 6px;
        }
        .project-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .tree-node {
            padding: 4px 8px;
            margin: 2px 0;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .tree-node:hover { background: var(--bg-primary); }
        .node-name { display: flex; align-items: center; gap: 8px; }
        .node-actions i { margin-left: 6px; opacity: 0.6; font-size: 0.7rem; }
        .node-actions i:hover { opacity: 1; color: var(--accent); }

        /* Editor Area */
        .main-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tabs-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 2px;
            overflow-x: auto;
            padding: 0 8px;
        }
        .tab {
            padding: 8px 16px;
            background: var(--tab-inactive);
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .tab.active {
            background: var(--tab-active);
            border-bottom: 2px solid var(--accent);
        }
        .tab-close {
            margin-left: 6px;
            opacity: 0.6;
        }
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .code-container {
            display: flex;
            flex: 1;
            overflow: auto;
        }
        .line-numbers {
            background: var(--bg-sidebar);
            padding: 12px 8px;
            text-align: right;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            user-select: none;
            border-right: 1px solid var(--border);
            line-height: 1.5;
            overflow-y: hidden;
        }
        .editor-content {
            flex: 1;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            padding: 12px;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg-editor);
            color: var(--text-primary);
            overflow: auto;
        }
        .status-bar {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 4px 12px;
            font-size: 0.7rem;
            display: flex;
            gap: 16px;
        }
        /* Right Panel */
        .right-panel {
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel-header {
            padding: 12px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .tool-section {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 8px 0;
        }
        input[type="color"] { width: 100%; margin: 8px 0; }
        .search-box { width: 100%; padding: 6px; margin: 6px 0; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; }

        /* Bottom Console */
        .bottom-panel {
            grid-column: 2 / 3;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            height: 180px;
            display: flex;
            flex-direction: column;
        }
        .console-header {
            padding: 6px 12px;
            background: var(--bg-sidebar);
            font-weight: 600;
        }
        .console-output {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            z-index: 999;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .collapsed { width: 40px; overflow: hidden; }
        .resizer { cursor: ew-resize; width: 4px; background: var(--border); }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="navbar">
        <div class="logo"><h1><i class="fas fa-code"></i> JS Code Editor</h1></div>
        <div class="actions">
            <button id="newProjectBtn" class="btn"><i class="fas fa-folder-open"></i> New Project</button>
            <button id="saveProjectBtn" class="btn"><i class="fas fa-save"></i> Save</button>
            <button id="runBtn" class="btn"><i class="fas fa-play"></i> Run</button>
            <button id="shareBtn" class="btn"><i class="fas fa-share-alt"></i> Share</button>
            <button id="themeToggle" class="btn"><i class="fas fa-moon"></i> Theme</button>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div class="explorer-header"><span class="explorer-title"><i class="fas fa-project-diagram"></i> Project Explorer</span><div class="folder-actions"><button id="createFolderBtn" class="btn-icon btn" title="New Folder"><i class="fas fa-folder-plus"></i></button><button id="createFileBtn" class="btn-icon btn" title="New File"><i class="fas fa-file-plus"></i></button></div></div>
        <div id="projectTree" class="project-tree"></div>
    </div>
    <div class="main-area">
        <div class="tabs-bar" id="tabsContainer"></div>
        <div class="editor-wrapper">
            <div class="code-container">
                <div id="lineNumbers" class="line-numbers">1</div>
                <div id="editorContent" class="editor-content" contenteditable="true" spellcheck="false"></div>
            </div>
            <div class="status-bar"><span id="cursorPos">Ln 1, Col 1</span><span id="fileTypeStatus">Ready</span></div>
        </div>
        <div class="bottom-panel" id="bottomPanel">
            <div class="console-header"><i class="fas fa-terminal"></i> Console / Output <button id="closeConsoleBtn" style="float:right; background:none; border:none; color:var(--text-secondary); cursor:pointer;"><i class="fas fa-times"></i></button></div>
            <div id="consoleOutput" class="console-output">▶ Click Run to preview code</div>
        </div>
    </div>
    <div class="right-panel" id="rightPanel">
        <div class="panel-header"><i class="fas fa-tools"></i> Tools <i id="collapseRight" class="fas fa-chevron-right" style="float:right; cursor:pointer;"></i></div>
        <div id="toolsContent"><div class="tool-section"><b>🎨 Color Picker</b><input type="color" id="colorPicker" value="#3b82f6"><div id="colorPreview" class="color-preview"></div><button id="insertColorBtn" class="btn">Insert Color</button><div><small>HEX: <span id="hexValue">#3b82f6</span> RGB: <span id="rgbValue">59,130,246</span></small></div></div><div class="tool-section"><b>🔍 Search & Replace</b><input type="text" id="searchInput" class="search-box" placeholder="Find..."><input type="text" id="replaceInput" class="search-box" placeholder="Replace..."><button id="findBtn" class="btn">Find</button> <button id="replaceBtn" class="btn">Replace</button></div><div class="tool-section"><b>✂️ Editor Tools</b><div><button id="copyBtn" class="btn"><i class="fas fa-copy"></i> Copy</button> <button id="cutBtn" class="btn"><i class="fas fa-cut"></i> Cut</button> <button id="pasteBtn" class="btn"><i class="fas fa-paste"></i> Paste</button> <button id="selectAllBtn" class="btn">Select All</button> <button id="undoBtn" class="btn"><i class="fas fa-undo"></i> Undo</button> <button id="redoBtn" class="btn"><i class="fas fa-redo"></i> Redo</button></div></div></div>
    </div>
</div>
<script>
    // ---------- DATA MODELS ----------
    let projects = []; let currentProjectId = null; let currentFileKey = null; let openTabs = []; let activeTabId = null;
    let editorHistory = { stack: [], index: -1 }; let ignoreHistory = false;
    function loadFromStorage() { const p = localStorage.getItem("js_editor_projects"); if(p) projects = JSON.parse(p); else projects = [{ id: "proj1", name: "MyWorkspace", files: { "index.html": { name:"index.html", type:"html", content:"<h1>Hello World</h1>" }, "style.css": { name:"style.css", type:"css", content:"body{font-family:sans-serif;}" }, "script.js": { name:"script.js", type:"js", content:"console.log('ready');" } }, folderTree: null }]; currentProjectId = localStorage.getItem("currentProject") || projects[0]?.id; if(!projects.find(p=>p.id===currentProjectId)) currentProjectId=projects[0]?.id; }
    function saveProjectsToStorage() { localStorage.setItem("js_editor_projects", JSON.stringify(projects)); localStorage.setItem("currentProject", currentProjectId); }
    function getCurrentProject() { return projects.find(p=>p.id===currentProjectId); }
    function saveAllOpenFiles() { if(!currentFileKey) return; const proj = getCurrentProject(); if(proj && currentFileKey && proj.files[currentFileKey]) { proj.files[currentFileKey].content = editorEl.innerText; saveProjectsToStorage(); } }
    // editor ref
    const editorEl = document.getElementById("editorContent");
    const lineNumbersDiv = document.getElementById("lineNumbers");
    function updateLineNumbers() { const lines = editorEl.innerText.split('\n'); let nums = ''; for(let i=1;i<=lines.length;i++) nums+= i + '<br>'; lineNumbersDiv.innerHTML = nums; }
    function syncCursor() { const sel = window.getSelection(); if(sel.rangeCount) { const range = sel.getRangeAt(0); const preCaret = range.cloneRange(); preCaret.selectNodeContents(editorEl); preCaret.setEnd(range.endContainer, range.endOffset); const row = (preCaret.toString().match(/\n/g)||[]).length + 1; const col = range.endOffset - (preCaret.toString().lastIndexOf('\n')+1); document.getElementById("cursorPos").innerText = `Ln ${row}, Col ${col+1}`; } }
    function highlightSyntax() { /* basic lightweight syntax highlighter (keywords, strings) for demo */ if(!currentFileKey) return; const code = editorEl.innerText; const ext = currentFileKey.split('.').pop(); let html = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); if(ext === 'js') html = html.replace(/\b(const|let|var|function|return|if|else|for|while|class|export|import|async|await)\b/g, '<span style="color:#c678dd;">$&</span>').replace(/\/\/.*/g, '<span style="color:#98c379;">$&</span>').replace(/(".*?"|'.*?')/g, '<span style="color:#e5c07b;">$&</span>'); else if(ext === 'html') html = html.replace(/&lt;(\/?[\w-]+)(.*?)&gt;/g, '<span style="color:#e06c75;">&lt;$1$2&gt;</span>'); else if(ext === 'css') html = html.replace(/([{}:;])/g, '<span style="color:#56b6c2;">$&</span>').replace(/\b(color|background|margin|padding|display|flex)\b/g, '<span style="color:#c678dd;">$&</span>'); editorEl.innerHTML = html; restoreCaret(); }
    let lastContent = '';
    function onEditorInput() { updateLineNumbers(); syncCursor(); saveAllOpenFiles(); if(!ignoreHistory) addToHistory(editorEl.innerText); }
    function addToHistory(content) { editorHistory.stack = editorHistory.stack.slice(0, editorHistory.index+1); editorHistory.stack.push(content); editorHistory.index++; }
    function undo() { if(editorHistory.index>0) { editorHistory.index--; ignoreHistory=true; editorEl.innerText=editorHistory.stack[editorHistory.index]; onEditorInput(); ignoreHistory=false; } }
    function redo() { if(editorHistory.index<editorHistory.stack.length-1){ editorHistory.index++; ignoreHistory=true; editorEl.innerText=editorHistory.stack[editorHistory.index]; onEditorInput(); ignoreHistory=false; } }
    function restoreCaret() { /* keep focus */ editorEl.focus(); }
    function loadFileIntoEditor(fileKey) { if(!getCurrentProject()) return; const file = getCurrentProject().files[fileKey]; if(file){ currentFileKey=fileKey; editorEl.innerText=file.content; addToHistory(file.content); updateLineNumbers(); highlightSyntax(); syncCursor(); document.getElementById("fileTypeStatus").innerText = file.name; }
    }
    function renderTabs() { const container = document.getElementById("tabsContainer"); container.innerHTML=""; openTabs.forEach(tab=>{ const tabDiv = document.createElement("div"); tabDiv.className = `tab ${activeTabId===tab.id ? 'active':''}`; tabDiv.innerHTML = `<i class="fas fa-file-code"></i>${tab.name}<i class="fas fa-times tab-close" data-id="${tab.id}"></i>`; tabDiv.addEventListener("click",(e)=>{ if(!e.target.classList.contains("tab-close")){ activeTabId=tab.id; loadFileIntoEditor(tab.fileKey); renderTabs(); } }); const closeBtn = tabDiv.querySelector(".tab-close"); closeBtn.addEventListener("click",(e)=>{ e.stopPropagation(); openTabs = openTabs.filter(t=>t.id!==tab.id); if(activeTabId===tab.id && openTabs.length){ activeTabId=openTabs[0].id; loadFileIntoEditor(openTabs[0].fileKey); }else if(openTabs.length===0){ activeTabId=null; currentFileKey=null; editorEl.innerText=""; lineNumbersDiv.innerHTML="1"; } renderTabs(); saveProjectsToStorage(); }); container.appendChild(tabDiv); }); }
    function openFile(fileKey){ const proj=getCurrentProject(); const file=proj.files[fileKey]; if(!file) return; if(!openTabs.find(t=>t.fileKey===fileKey)){ const newId=Date.now()+Math.random(); openTabs.push({id:newId, name:file.name, fileKey:fileKey}); } activeTabId=openTabs.find(t=>t.fileKey===fileKey).id; loadFileIntoEditor(fileKey); renderTabs(); }
    function renderProjectTree(){ const proj=getCurrentProject(); if(!proj) return; const container=document.getElementById("projectTree"); container.innerHTML=""; const files=Object.keys(proj.files); files.forEach(fkey=>{ const node=document.createElement("div"); node.className="tree-node"; node.innerHTML=`<div class="node-name"><i class="fas fa-file"></i> ${proj.files[fkey].name}</div><div class="node-actions"><i class="fas fa-pen rename-file" data-key="${fkey}"></i> <i class="fas fa-trash delete-file" data-key="${fkey}"></i> <i class="fas fa-download download-file" data-key="${fkey}"></i></div>`; node.querySelector(".node-name").addEventListener("click",()=>openFile(fkey)); node.querySelector(".rename-file")?.addEventListener("click",(e)=>{ e.stopPropagation(); const newName=prompt("New name:",proj.files[fkey].name); if(newName){ const ext=newName.split('.').pop(); proj.files[fkey].name=newName; proj.files[fkey].type=ext; const newKey=newName; proj.files[newKey]=proj.files[fkey]; delete proj.files[fkey]; if(currentFileKey===fkey) currentFileKey=newKey; openTabs=openTabs.map(t=>t.fileKey===fkey? {...t, name:newName, fileKey:newKey}:t); saveProjectsToStorage(); renderProjectTree(); renderTabs(); toast("Renamed"); } }); node.querySelector(".delete-file")?.addEventListener("click",(e)=>{ e.stopPropagation(); if(confirm("Delete file?")){ delete proj.files[fkey]; if(currentFileKey===fkey){ currentFileKey=null; editorEl.innerText=""; } openTabs=openTabs.filter(t=>t.fileKey!==fkey); if(openTabs.length) activeTabId=openTabs[0].id,loadFileIntoEditor(openTabs[0].fileKey); else activeTabId=null; saveProjectsToStorage(); renderProjectTree(); renderTabs(); toast("Deleted"); } }); node.querySelector(".download-file")?.addEventListener("click",()=>{ const blob=new Blob([proj.files[fkey].content],{type:"text/plain"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=proj.files[fkey].name; a.click(); }); container.appendChild(node); }); }
    function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    // create new project
    function newProject(){ const name=prompt("Project Name:","MyProject"); if(!name) return; const newId="proj_"+Date.now(); const newProj={id:newId, name:name, files:{"main.js":{name:"main.js",type:"js",content:"// start coding"}}}; projects.push(newProj); currentProjectId=newId; openTabs=[]; activeTabId=null; saveProjectsToStorage(); renderProjectTree(); toast(`Project ${name} created`); }
    // share: export json
    function exportProject(){ const proj=getCurrentProject(); const data=JSON.stringify({name:proj.name, files:proj.files}); const blob=new Blob([data],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`${proj.name}.json`; a.click(); toast("Project exported"); }
    function importProject(file){ const reader=new FileReader(); reader.onload=e=>{ const data=JSON.parse(e.target.result); const newId="proj_"+Date.now(); projects.push({id:newId, name:data.name||"Imported", files:data.files}); currentProjectId=newId; saveProjectsToStorage(); renderProjectTree(); toast("Imported"); }; reader.readAsText(file); }
    // run preview
    function runCode(){ const activeFile=getCurrentProject()?.files[currentFileKey]; if(!activeFile){ document.getElementById("consoleOutput").innerHTML="No file open"; return; } const ext=activeFile.type; let htmlContent=""; if(ext==="html") htmlContent=activeFile.content; else if(ext==="js") htmlContent=`<script>${activeFile.content}<\/script>`; else if(ext==="css") htmlContent=`<style>${activeFile.content}<\/style>`; else htmlContent=activeFile.content; const preview= `<html><head><meta charset="UTF-8"><style>body{background:#fff;}</style></head><body>${htmlContent}</body></html>`; const iframe=document.createElement("iframe"); document.getElementById("consoleOutput").innerHTML=""; document.getElementById("consoleOutput").appendChild(iframe); iframe.srcdoc=preview; }
    // color picker
    const colorPicker=document.getElementById("colorPicker"); const hexSpan=document.getElementById("hexValue"); const rgbSpan=document.getElementById("rgbValue"); colorPicker.addEventListener("input",()=>{ const val=colorPicker.value; hexSpan.innerText=val; const r=parseInt(val.slice(1,3),16); const g=parseInt(val.slice(3,5),16); const b=parseInt(val.slice(5,7),16); rgbSpan.innerText=`${r},${g},${b}`; }); document.getElementById("insertColorBtn").addEventListener("click",()=>{ const col=colorPicker.value; document.execCommand("insertText",false,col); toast("Color inserted"); });
    // search replace
    document.getElementById("findBtn").addEventListener("click",()=>{ const term=document.getElementById("searchInput").value; if(!term) return; const content=editorEl.innerText; const idx=content.indexOf(term); if(idx!==-1){ editorEl.focus(); const range=document.createRange(); const sel=window.getSelection(); const textNode=editorEl.firstChild; if(textNode){ range.setStart(textNode,idx); range.setEnd(textNode,idx+term.length); sel.removeAllRanges(); sel.addRange(range); } } else toast("Not found"); });
    document.getElementById("replaceBtn").addEventListener("click",()=>{ const find=document.getElementById("searchInput").value; const replace=document.getElementById("replaceInput").value; if(find){ const newContent=editorEl.innerText.replaceAll(find,replace); editorEl.innerText=newContent; onEditorInput(); toast("Replaced"); } });
    // copy/cut/paste/selectAll
    document.getElementById("copyBtn").addEventListener("click",()=>{ document.execCommand("copy"); toast("Copied"); });
    document.getElementById("cutBtn").addEventListener("click",()=>{ document.execCommand("cut"); });
    document.getElementById("pasteBtn").addEventListener("click",()=>{ navigator.clipboard.readText().then(t=>{ document.execCommand("insertText",false,t); }); });
    document.getElementById("selectAllBtn").addEventListener("click",()=>{ document.execCommand("selectAll"); });
    document.getElementById("undoBtn").addEventListener("click",()=>undo());
    document.getElementById("redoBtn").addEventListener("click",()=>redo());
    // theme
    let dark=true; document.getElementById("themeToggle").addEventListener("click",()=>{ document.body.classList.toggle("light"); dark=!dark; localStorage.setItem("theme",dark?"dark":"light"); toast(`Theme: ${dark?"Dark":"Light"}`); });
    // project actions
    document.getElementById("newProjectBtn").addEventListener("click",newProject);
    document.getElementById("saveProjectBtn").addEventListener("click",()=>{ saveAllOpenFiles(); toast("Saved all"); });
    document.getElementById("runBtn").addEventListener("click",runCode);
    document.getElementById("shareBtn").addEventListener("click",exportProject);
    document.getElementById("createFolderBtn").addEventListener("click",()=>{ const fname=prompt("Folder name:","newFolder"); if(fname) toast("Folders simulated (virtual) - create file inside"); });
    document.getElementById("createFileBtn").addEventListener("click",()=>{ const proj=getCurrentProject(); if(!proj) return; const fileName=prompt("File name (with extension):","script.js"); if(fileName){ const ext=fileName.split('.').pop(); proj.files[fileName]={name:fileName,type:ext,content:""}; saveProjectsToStorage(); renderProjectTree(); openFile(fileName); toast("File created"); } });
    // drag & drop support
    editorEl.addEventListener("dragover",e=>e.preventDefault()); editorEl.addEventListener("drop",e=>{ e.preventDefault(); const file=e.dataTransfer.files[0]; if(file && file.type==="text/plain"){ const reader=new FileReader(); reader.onload=ev=>{ document.execCommand("insertText",false,ev.target.result); toast("File inserted"); }; reader.readAsText(file); } });
    // keyboard shortcuts
    document.addEventListener("keydown",(e)=>{ if(e.ctrlKey && e.key==='s'){ e.preventDefault(); saveAllOpenFiles(); toast("Saved"); } if(e.ctrlKey && e.key==='f'){ e.preventDefault(); document.getElementById("searchInput").focus(); } if(e.ctrlKey && e.key==='z'){ e.preventDefault(); undo(); } if(e.ctrlKey && e.key==='y'){ e.preventDefault(); redo(); } });
    // init
    loadFromStorage(); renderProjectTree(); if(Object.keys(getCurrentProject()?.files||{}).length>0){ const firstFile=Object.keys(getCurrentProject().files)[0]; openFile(firstFile); } renderTabs(); editorEl.addEventListener("input",onEditorInput); editorEl.addEventListener("keyup",syncCursor); editorEl.addEventListener("click",syncCursor); if(localStorage.getItem("theme")==="light") document.body.classList.add("light");
    document.getElementById("closeConsoleBtn").addEventListener("click",()=>{ document.getElementById("bottomPanel").style.display="none"; });
    document.getElementById("collapseRight").addEventListener("click",()=>{ const rp=document.getElementById("rightPanel"); if(rp.style.width==="40px"){ rp.style.width="280px"; document.getElementById("toolsContent").style.display="block"; }else{ rp.style.width="40px"; document.getElementById("toolsContent").style.display="none"; } });
    window.addEventListener("beforeunload",()=>saveAllOpenFiles());
</script>
</body>
</html>
